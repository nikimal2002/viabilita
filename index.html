<!DOCTYPE html>
<html lang="it">

<title>Fincantieri Monfalcone — Simulazione Viabilità</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'SF Mono',monospace;background:#080c12;color:#d1d5db;overflow:hidden;height:100vh;display:flex;flex-direction:column}
#header{padding:10px 15px;background:#001d3d;border-bottom:2px solid #c9a84c;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#clock{background:#0d1520;padding:5px 12px;border-radius:4px;border:1px solid #1a3050;font-size:18px;font-weight:700;color:#c9a84c;font-variant-numeric:tabular-nums}
.btn{padding:5px 12px;border-radius:3px;cursor:pointer;font-size:11px;font-weight:600;text-transform:uppercase}
.btn-play{border:1px solid #c9a84c;background:#001d3d;color:#fff}
#main{display:flex;flex:1;overflow:hidden}
#panel{width:280px;background:#0d1117;border-right:1px solid #1a2030;overflow-y:auto;padding:15px;flex-shrink:0;font-size:11px}
.section-title{font-size:9px;color:#c9a84c;letter-spacing:2px;margin-bottom:8px;font-weight:700;text-transform:uppercase}
.stat-box{background:#111827;border:1px solid #1f2937;border-radius:4px;padding:8px;margin-bottom:12px}
.param-row{margin-bottom:10px}
.param-row input[type=range]{width:100%;accent-color:#c9a84c}
#map{flex:1;background:#080c12}
/* Stilizzazione Camion */
.truck-container {
    width: 20px;
    height: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
}
.truck-body {
    width: 16px;
    height: 8px;
    border-radius: 1px;
    position: relative;
    border: 0.5px solid rgba(0,0,0,0.3);
}
.truck-cabin {
    position: absolute;
    right: 0; /* Cabina davanti (destra) */
    top: 0;
    width: 4px;
    height: 100%;
    background: rgba(255,255,255,0.4);
    border-radius: 0 1px 1px 0;
}

<div id="header">
  <div style="display:flex;align-items:center;gap:10px">
    <div style="background:#c9a84c;color:#001d3d;padding:4px 8px;font-weight:900;border-radius:3px">FC</div>
    <div><b style="color:white;font-size:14px">FINCANTIERI MONFALCONE</b><br><span style="font-size:9px;color:#c9a84c">DIREZIONE DI MARCIA - MAX 15 KM/H</span></div>
  </div>
  <div style="display:flex;align-items:center;gap:15px">
    <div id="clock">07:00</div>
    <button class="btn btn-play" id="btnPlay" onclick="toggleSim()">▶ Avvia</button>
    <button class="btn" style="background:#111;color:#888;border:1px solid #333" onclick="resetSim()">RESET</button>
  </div>
</div>

        <div style="display:flex;justify-content:space-between"><span>In coda (USCITA):</span><b id="qOut" style="color:#22c55e">0</b></div>
    </div>
    
    <div class="section-title">CONFIGURAZIONE</div>
    <div class="param-row">
        <label style="display:flex;justify-content:space-between"><span>Camion/giorno:</span><b id="v_t">30</b></label>
        <input type="range" min="10" max="100" value="30" id="s_t" oninput="document.getElementById('v_t').textContent=this.value">
    </div>
    <div class="param-row">
        <label style="display:flex;justify-content:space-between"><span>Tempo Pesa (min):</span><b id="v_p">8</b></label>

    </div>
    <button class="btn btn-play" style="width:100%;margin-top:10px" onclick="resetSim()">Applica Parametri</button>
    
    <div style="margin-top:20px; font-size:9px; color:#555; line-height:1.4">

    </div>
  </div>
  <div id="map"></div>
</div>

const SPLITS = {riva:44, mag51:53, parco:68};
const PESA_IN={lon:13.5404377,lat:45.7921712}, PESA_OUT={lon:13.5403606,lat:45.7922759};

// --- LOGICA DI CALCOLO E ORIENTAMENTO ---
const METERS_PER_TICK = 25; // 25m ogni 6s = 15 km/h
const TICKS_PER_MIN = 10;
const M_LAT = 111320, M_LON = 111320 * Math.cos(45.795 * Math.PI / 180);

function getPathLen(pts) {
    let l=0;
    for(let i=1; i<pts.length; i++) {
        let dx=(pts[i][0]-pts[i-1][0])*M_LON, dy=(pts[i][1]-pts[i-1][1])*M_LAT;
        l += Math.sqrt(dx*dx+dy*dy);
    }
    return l;
}

function getPosAt(pts, prog) {
    if(!pts || pts.length < 2) return {lon:0, lat:0, angle:0};
    const total = getPathLen(pts);
    let target = Math.max(0, Math.min(1, prog)) * total;
    for(let i=1; i<pts.length; i++) {
        let dx=(pts[i][0]-pts[i-1][0])*M_LON, dy=(pts[i][1]-pts[i-1][1])*M_LAT;
        let seg = Math.sqrt(dx*dx+dy*dy);
        if(target <= seg || i === pts.length-1) {
            let t = seg > 0 ? target/seg : 0;
            // Angolo: atan2(dy, dx) trasforma in gradi. 
            // Sottraiamo per il sistema Leaflet/CSS dove 0 è Est e la rotazione è oraria.
            let angle = Math.atan2(dy, dx) * 180 / Math.PI;
            return {
                lon: pts[i-1][0] + (pts[i][0]-pts[i-1][0])*t,
                lat: pts[i-1][1] + (pts[i][1]-pts[i-1][1])*t,
                angle: -angle // Ruotiamo l'icona
            };
        }
        target -= seg;
    }
}

// --- SIMULAZIONE ---
let map, vehicles=[], routeData={}, simTime=420, simRunning=false, simInterval;
let vehicleMarkers=[];

function init() {
    map = L.map('map').setView([45.796, 13.538], 15);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {maxZoom:19}).addTo(map);

    // Disegno rotte più visibili
    const colors = {riva:'#ef4444', mag51:'#a855f7', parco:'#22c55e'};
    for(const [k, pts] of Object.entries({riva:R_RIVA, mag51:R_MAG51, parco:R_PARCO})) {
        const s = SPLITS[k];
        const out = pts.slice(0, s), inn = pts.slice(s);
        L.polyline(pts.map(p=>[p[1],p[0]]), {color: colors[k], weight: 5, opacity: 0.7}).addTo(map);
        
        routeData[k] = {
            out, inn,
            spdOut: METERS_PER_TICK / getPathLen(out),
            spdIn: METERS_PER_TICK / getPathLen(inn)
        };
    }
    resetSim();
}

function resetSim() {
    simTime=420; vehicles=[];
    const n = +document.getElementById('s_t').value;
    const rks = ['riva','mag51','parco'];
    for(let i=0; i<n; i++) {
        vehicles.push({
            id: i, rk: rks[i%3], state:'wait', prog:0,
            arrival: 420 + Math.random()*540, timer:0
        });
    }
    updateUI();
}

function tick() {
    simTime += 0.1; // +6 secondi
    if(simTime > 1080) stopSim();
    
    vehicles.forEach(v => {
        const r = routeData[v.rk];
        if(v.state==='wait' && simTime >= v.arrival) v.state='out';
        if(v.state==='out') {
            v.prog += r.spdOut;
            if(v.prog >= 1) { v.state='unload'; v.timer=200; }
        }
        if(v.state==='unload') { v.timer--; if(v.timer<=0) { v.state='in'; v.prog=0; } }
        if(v.state==='in') {
            v.prog += r.spdIn;
            if(v.prog >= 1) v.state='done';
        }
    });
    
    updateUI();
    drawVehicles();
}

function drawVehicles() {
    vehicleMarkers.forEach(m => map.removeLayer(m));
    vehicleMarkers = [];
    
    vehicles.filter(v=>v.state==='out'||v.state==='in').forEach(v => {
        const r = routeData[v.rk];
        const p = getPosAt(v.state==='out' ? r.out : r.inn, v.prog);
        const color = v.rk==='riva'?'#ef4444':(v.rk==='parco'?'#22c55e':'#a855f7');
        
        const html = `
            <div class="truck-container" style="transform: rotate(${p.angle}deg)">
                <div class="truck-body" style="background: ${color}">
                    <div class="truck-cabin"></div>
                </div>
            </div>`;
        
        const m = L.marker([p.lat, p.lon], {
            icon: L.divIcon({className:'', html, iconSize:[20,10]})
        }).addTo(map);
        vehicleMarkers.push(m);
    });
}

function updateUI() {
    const h=Math.floor(simTime/60), m=Math.floor(simTime%60);
    document.getElementById('clock').textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
    document.getElementById('qIn').textContent = vehicles.filter(v=>v.state==='out' && v.prog<0.2).length;
}

function toggleSim() {
    simRunning = !simRunning;
    document.getElementById('btnPlay').textContent = simRunning ? '⏸ Pausa' : '▶ Avvia';
    if(simRunning) simInterval = setInterval(tick, 60);
    else clearInterval(simInterval);
}

window.onload = init;
</script>
